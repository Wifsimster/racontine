name: Release — semantic versioning

# À chaque merge sur `main`, analyse les commits conventionnels (`feat`, `fix`,
# `BREAKING CHANGE`) pour calculer la prochaine version, met à jour les
# package.json + CHANGELOG, taggue le dépôt et publie une release GitHub.
#
# Le commit de release (`chore(release): x.y.z`) n'est pas releasable : il
# déclenche à nouveau ce workflow (no-op) ainsi que la reconstruction des
# images Docker, qui repartent alors avec la version fraîchement bumpée.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Semantic release
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/exec
            @semantic-release/git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
