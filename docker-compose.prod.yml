# Déploiement homelab : images tirées de GHCR (aucun build sur le homelab).
#   docker login ghcr.io          # PAT read:packages si les packages sont privés
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
# Les migrations sont appliquées automatiquement au démarrage du serveur.
services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-racontine}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD requis}
      POSTGRES_DB: ${POSTGRES_DB:-racontine}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-racontine}"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    image: ghcr.io/wifsimster/racontine-server:latest
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-racontine}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-racontine}
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  web:
    image: ghcr.io/wifsimster/racontine-web:latest
    restart: unless-stopped
    ports:
      # À placer derrière le reverse proxy (Traefik/NPM/Caddy) en HTTPS.
      - "8080:80"
    depends_on:
      - server

# Le reverse proxy route le domaine public vers web:80 ; nginx (dans l'image web)
# proxie /api/ vers server:3010. Seul `web` a besoin d'être exposé.
